[build]
  # Netlify publishes the src/ folder so the static preview URLs stay clean (e.g.,
  # /index.html). Before publishing, copy the Resources/ folder into src/ so the static
  # pages can reach assets via their existing ../Resources/ paths.
  # PHP files under src/api/ and src/php/ are NOT executed on Netlify; they are present
  # only as source code and will be served as plain text if accessed.
  publish = "src"
  command = "rm -rf src/Resources && cp -R Resources src/Resources"

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Ensure media assets are served with the correct MIME types.
[[headers]]
  for = "*.mp4"
  [headers.values]
    Content-Type = "video/mp4"

# Force Netlify to recognize and serve robots.txt safely
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "no-cache"

# Force Netlify to recognize and serve sitemap.xml safely
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "no-cache"

# Ensure Google Verification HTML file bypasses caching engines
[[headers]]
  for = "/google*.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"
    Cache-Control = "no-cache"